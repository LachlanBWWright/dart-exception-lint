name: dart_exception_lint
description: Analyzer plugin that reports null assertions, manual throws, and uncaught configured third-party throwing API calls.
version: 0.1.0-dev.1
repository: https://github.com/LachlanBWWright/dart-exception-lint

environment:
  sdk: ^3.10.0

dependencies:
  analysis_server_plugin: ^0.3.0
  analyzer: ^8.0.0
  analyzer_plugin: ^0.13.0
  path: ^1.9.1
  yaml: ^3.1.3

dev_dependencies:
  analyzer_testing: ^0.1.5
  lints: ^6.0.0
  test: ^1.26.0
  test_reflective_loader: ^0.4.0
